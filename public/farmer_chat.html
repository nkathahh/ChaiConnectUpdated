<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChaiConnect Assistant</title>
  <link rel="stylesheet" href="/css/farmer_dashboard_items.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ── Chat page layout ─────────────────────────────────── */
    .chat-page-wrapper {
      max-width: 780px;
      margin: 0 auto;
      padding: 2.25rem 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      box-sizing: border-box;
    }

    /* ── Header ── */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: .75rem;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .chat-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green-deep), var(--green-mid));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: white;
      flex-shrink: 0;
    }

    .chat-header-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--green-deep);
      line-height: 1.2;
    }

    .chat-header-sub {
      font-size: 0.76rem;
      color: var(--text-light);
      margin-top: 0.1rem;
    }

    .chat-online-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #10b981;
      margin-right: 0.35rem;
      vertical-align: middle;
    }

    /* ── Suggestion chips ── */
    .chat-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-shrink: 0;
    }

    .chip-suggest {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-mid);
      background: var(--white);
      cursor: pointer;
      transition: all .2s;
      font-family: 'DM Sans', sans-serif;
    }

    .chip-suggest:hover {
      background: var(--green-xlight);
      border-color: var(--green-light);
      color: var(--green-deep);
    }

    /* ── Messages container ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1.25rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      scroll-behavior: smooth;
      min-height: 0;
    }

    /* Scrollbar */
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Message bubbles ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 0.6rem;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .msg-icon.bot { background: var(--green-deep); color: white; }
    .msg-icon.user { background: var(--green-light); color: var(--green-deep); }

    .msg-bubble {
      max-width: 72%;
      padding: 0.85rem 1.1rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      line-height: 1.7;
      word-break: break-word;
    }

    .msg-bubble.bot {
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--text-dark);
      border-bottom-left-radius: 4px;
    }

    .msg-bubble.user {
      background: var(--green-deep);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 0.68rem;
      color: var(--text-light);
      margin-top: 0.3rem;
      text-align: right;
    }

    .msg-row.bot-row .msg-time { text-align: left; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      background: var(--white);
      border: 1px solid var(--border);
      padding: 0.7rem 1rem;
      border-radius: var(--radius-md);
      border-bottom-left-radius: 4px;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green-light);
      animation: typingBounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); background: var(--green-light); }
      30%            { transform: translateY(-6px); background: var(--green-mid); }
    }

    /* ── Input row ── */
    .chat-input-row {
      display: flex;
      align-items: flex-end;
      gap: 0.6rem;
      margin-top: 0.85rem;
      flex-shrink: 0;
    }

    .chat-input-wrap {
      flex: 1;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      display: flex;
      align-items: flex-end;
      padding: 0.6rem 0.8rem;
      gap: 0.5rem;
      transition: border-color .2s, box-shadow .2s;
    }

    .chat-input-wrap:focus-within {
      border-color: var(--green-bright);
      box-shadow: 0 0 0 3px rgba(45,155,111,.1);
    }

    #chatInput {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--text-dark);
      background: transparent;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }

    #chatInput::placeholder { color: var(--text-light); }

    .chat-send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--green-deep);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.85rem;
      flex-shrink: 0;
      transition: background .2s, transform .1s;
    }

    .chat-send-btn:hover  { background: var(--green-mid); }
    .chat-send-btn:active { transform: scale(.93); }
    .chat-send-btn:disabled { background: var(--border); cursor: not-allowed; }

    .chat-clear-btn {
      height: 36px;
      padding: 0 0.85rem;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-light);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .chat-clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Markdown-style rendering in bot messages ── */
    .msg-bubble.bot strong { font-weight: 700; color: var(--green-deep); }
    .msg-bubble.bot em     { font-style: italic; }
    .msg-bubble.bot code   {
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      background: var(--bg);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
    }

    .msg-bubble.bot ul,
    .msg-bubble.bot ol {
      margin: 0.5rem 0 0.25rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .msg-bubble.bot li { line-height: 1.6; }

    /* ── Error state ── */
    .msg-bubble.error {
      background: #fee2e2;
      border-color: #fca5a5;
      color: #991b1b;
    }

    /* ── Context loaded notice ── */
    .context-notice {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-light);
      padding: 0.5rem 0.75rem;
      background: var(--green-xlight);
      border: 1px solid var(--green-light);
      border-radius: var(--radius-sm);
      margin-bottom: 0.5rem;
      flex-shrink: 0;
    }

    /* ── Dark mode ── */
    .dark-mode .chat-messages      { background: var(--dm-bg); border-color: var(--dm-border); }
    .dark-mode .msg-bubble.bot     { background: var(--dm-surface); border-color: var(--dm-border); color: var(--dm-text); }
    .dark-mode .chat-input-wrap    { background: var(--dm-surface); border-color: var(--dm-border); }
    .dark-mode #chatInput          { color: var(--dm-text); }
    .dark-mode .chip-suggest       { background: var(--dm-surface); border-color: var(--dm-border); color: var(--dm-text-mid); }
    .dark-mode .chip-suggest:hover { background: var(--dm-surface2); }
    .dark-mode .typing-dots        { background: var(--dm-surface); border-color: var(--dm-border); }
    .dark-mode .context-notice     { background: var(--dm-surface2); border-color: var(--dm-border); }
    .dark-mode .chat-clear-btn     { background: var(--dm-surface); border-color: var(--dm-border); color: var(--dm-text-mid); }
    .dark-mode .chat-header-title  { color: var(--dm-text); }

    @media (max-width: 600px) {
      .chat-page-wrapper { padding: 1.25rem 1rem 1rem; }
      .msg-bubble { max-width: 86%; }
      .chat-suggestions { display: none; }
    }
  </style>
</head>
<body>
  <script src="/theme.js"></script>

  <div class="chat-page-wrapper">

    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-avatar"><i class="fas fa-leaf"></i></div>
        <div>
          <div class="chat-header-title">Chai Assistant</div>
          <div class="chat-header-sub">
            <span class="chat-online-dot"></span>Powered by AI · Knows your account
          </div>
        </div>
      </div>
      <a href="/farmer_dashboard.html" class="btn-back-dashboard">
        <i class="fas fa-arrow-left"></i> Dashboard
      </a>
    </div>

    <!-- Context loaded indicator (shown after farmer data loads) -->
    <div class="context-notice" id="contextNotice" style="display:none;">
      <i class="fas fa-circle-check" style="color:var(--green-mid);"></i>
      <span id="contextText">Your account data has been loaded. The assistant can answer questions about your deliveries and payments.</span>
    </div>

    <!-- Quick suggestion chips -->
    <div class="chat-suggestions" id="suggestionsRow">
      <button class="chip-suggest" onclick="sendSuggestion(this)">
        <i class="fas fa-truck" style="font-size:.7rem;"></i> My recent deliveries
      </button>
      <button class="chip-suggest" onclick="sendSuggestion(this)">
        <i class="fas fa-money-bill-wave" style="font-size:.7rem;"></i> Payment summary
      </button>
      <button class="chip-suggest" onclick="sendSuggestion(this)">
        <i class="fas fa-star-half-stroke" style="font-size:.7rem;"></i> My quality grades
      </button>
      <button class="chip-suggest" onclick="sendSuggestion(this)">
        <i class="fas fa-hourglass-half" style="font-size:.7rem;"></i> Pending payments
      </button>
      <button class="chip-suggest" onclick="sendSuggestion(this)">
        <i class="fas fa-circle-question" style="font-size:.7rem;"></i> How is my payment calculated?
      </button>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
      <!-- Welcome message injected by JS -->
    </div>

    <!-- Input -->
    <div class="chat-input-row">
      <div class="chat-input-wrap">
        <textarea
          id="chatInput"
          rows="1"
          placeholder="Ask about your deliveries, payments, grades..."
        ></textarea>
      </div>
      <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <i class="fas fa-paper-plane"></i>
      </button>
      <button class="chat-clear-btn" onclick="clearChat()" title="Clear conversation">
        <i class="fas fa-rotate-left"></i>
      </button>
    </div>

  </div>

  <script>
    /* ============================================================
       STATE
    ============================================================ */
    let conversationHistory = [];   // {role, content} pairs sent to API
    let farmerContext = null;        // loaded once on init
    let isTyping = false;

    /* ============================================================
       INIT
    ============================================================ */
    document.addEventListener('DOMContentLoaded', async () => {
      // Auto-resize textarea
      const input = document.getElementById('chatInput');
      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      });

      // Send on Enter (Shift+Enter = newline)
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });

      // Show welcome
      appendBotMessage(
        `Hello! I'm your Chai Assistant. I have access to your ChaiConnect account data and can help you with:\n\n` +
        `• Your delivery history and weights\n` +
        `• Payment amounts and pending earnings\n` +
        `• Quality grades and what they mean\n` +
        `• How to raise a complaint or request a visit\n\n` +
        `What would you like to know?`
      );

      // Load farmer context silently
      await loadFarmerContext();
    });

    /* ============================================================
       LOAD FARMER CONTEXT
       Fetches all relevant data once and builds a context string
       that is injected into every API call as a system message.
    ============================================================ */
    async function loadFarmerContext() {
      try {
        const [profileRes, paymentRes, deliveryRes, statsRes] = await Promise.allSettled([
          fetch('/my-profile'),
          fetch('/api/farmer/payments',       { credentials: 'include' }),
          fetch('/api/delivery-history',      { credentials: 'include' }),
          fetch('/api/farmer/payments/stats', { credentials: 'include' })
        ]);

        const profile   = profileRes.status   === 'fulfilled' && profileRes.value.ok   ? await profileRes.value.json()   : null;
        const payments  = paymentRes.status   === 'fulfilled' && paymentRes.value.ok   ? await paymentRes.value.json()   : [];
        const deliveries = deliveryRes.status === 'fulfilled' && deliveryRes.value.ok  ? await deliveryRes.value.json()  : [];
        const stats     = statsRes.status     === 'fulfilled' && statsRes.value.ok     ? await statsRes.value.json()     : null;

        // Build a concise context string for the AI
        const lines = [];

        if (profile) {
          lines.push(`FARMER PROFILE`);
          lines.push(`Name: ${profile.name || 'N/A'}`);
          lines.push(`Phone: ${profile.phone || 'N/A'}`);
          lines.push(`ID Number: ${profile.id_number || 'N/A'}`);
          lines.push(`Role: ${profile.role || 'farmer'}`);
          lines.push('');
        }

        if (stats) {
          lines.push(`PAYMENT SUMMARY`);
          lines.push(`Total earnings (all time): KES ${parseFloat(stats.total_earnings || 0).toLocaleString('en-KE', { minimumFractionDigits: 2 })}`);
          lines.push(`Earnings this month: KES ${parseFloat(stats.month_earnings || 0).toLocaleString('en-KE', { minimumFractionDigits: 2 })}`);
          lines.push(`Pending (unpaid deliveries): KES ${parseFloat(stats.pending_amount || 0).toLocaleString('en-KE', { minimumFractionDigits: 2 })}`);
          lines.push('');
        }

        if (deliveries && deliveries.length) {
          const recent = [...deliveries]
            .sort((a, b) => new Date(b.delivery_date) - new Date(a.delivery_date))
            .slice(0, 15);

          lines.push(`RECENT DELIVERIES (latest ${recent.length} of ${deliveries.length} total)`);
          recent.forEach((d, i) => {
            const date = new Date(d.delivery_date).toLocaleDateString('en-KE', { day: 'numeric', month: 'short', year: 'numeric' });
            lines.push(`${i + 1}. ${date} | ${d.quantity_kg ?? 'N/A'} kg | Grade ${d.quality_grade || 'N/A'} | Status: ${d.status || 'N/A'} | Payment: ${d.payment_status || 'N/A'} | Centre: ${d.collection_center || 'N/A'}`);
          });

          // Aggregate stats
          const totalKg   = deliveries.reduce((s, d) => s + parseFloat(d.quantity_kg || 0), 0);
          const gradeMap  = {};
          deliveries.forEach(d => { if (d.quality_grade) gradeMap[d.quality_grade] = (gradeMap[d.quality_grade] || 0) + 1; });
          const topGrade  = Object.entries(gradeMap).sort((a, b) => b[1] - a[1])[0];
          lines.push('');
          lines.push(`DELIVERY TOTALS`);
          lines.push(`Total deliveries: ${deliveries.length}`);
          lines.push(`Total weight delivered (all time): ${totalKg.toFixed(1)} kg`);
          lines.push(`Most common quality grade: ${topGrade ? `Grade ${topGrade[0]} (${topGrade[1]} deliveries)` : 'N/A'}`);
          lines.push('');
        }

        if (payments && payments.length) {
          const paid    = payments.filter(p => (p.status || '').toLowerCase() === 'completed');
          const pending = payments.filter(p => (p.status || '').toLowerCase() !== 'completed');
          lines.push(`PAYMENTS`);
          lines.push(`Completed payments: ${paid.length}`);
          lines.push(`Pending payments: ${pending.length}`);

          if (paid.length) {
            const latest = [...paid].sort((a, b) => new Date(b.payment_date) - new Date(a.payment_date)).slice(0, 5);
            lines.push(`Latest completed payments:`);
            latest.forEach((p, i) => {
              const date = p.payment_date ? new Date(p.payment_date).toLocaleDateString('en-KE') : 'N/A';
              lines.push(`  ${i + 1}. ${date} | Delivery #${p.delivery_id} | ${p.quantity_kg} kg | Grade ${p.quality_grade} | KES ${parseFloat(p.amount || 0).toFixed(2)} | Method: ${p.payment_method || 'N/A'}`);
            });
          }
        }

        farmerContext = lines.join('\n');

        // Show context notice
        const notice = document.getElementById('contextNotice');
        const name = profile?.name ? profile.name.split(' ')[0] : 'Farmer';
        document.getElementById('contextText').textContent =
          `Account loaded for ${name} — ${deliveries.length || 0} deliveries, ${payments.length || 0} payment records.`;
        notice.style.display = 'flex';

      } catch (err) {
        console.warn('Could not load farmer context:', err);
        // Graceful degradation — assistant still works, just without personal data
        farmerContext = 'Note: Farmer account data could not be loaded. Answer general questions about ChaiConnect only.';
      }
    }

    /* ============================================================
       SEND MESSAGE
    ============================================================ */
    async function sendMessage(overrideText) {
      const input   = document.getElementById('chatInput');
      const text    = (overrideText || input.value).trim();
      if (!text || isTyping) return;

      // Clear input
      input.value = '';
      input.style.height = 'auto';

      // Hide suggestion chips after first user message
      document.getElementById('suggestionsRow').style.display = 'none';

      // Add user message to UI
      appendUserMessage(text);

      // Add to conversation history
      conversationHistory.push({ role: 'user', content: text });

      // Show typing indicator
      const typingId = showTyping();
      isTyping = true;
      document.getElementById('sendBtn').disabled = true;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            messages: conversationHistory,
            context: farmerContext
          })
        });

        removeTyping(typingId);

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.message || `Server error ${response.status}`);
        }

        const data = await response.json();
        const reply = data.reply || 'Sorry, I could not generate a response. Please try again.';

        // Add assistant reply to history and UI
        conversationHistory.push({ role: 'assistant', content: reply });
        appendBotMessage(reply);

      } catch (err) {
        removeTyping(typingId);
        appendBotMessage(
          `I ran into an issue: ${err.message}. Please try again, or check your connection.`,
          true
        );
      } finally {
        isTyping = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('chatInput').focus();
      }
    }

    function sendSuggestion(btn) {
      sendMessage(btn.textContent.trim());
    }

    /* ============================================================
       UI HELPERS
    ============================================================ */
    function appendUserMessage(text) {
      const container = document.getElementById('chatMessages');
      const time = now();
      const div = document.createElement('div');
      div.className = 'msg-row user';
      div.innerHTML = `
        <div>
          <div class="msg-bubble user">${escapeHtml(text)}</div>
          <div class="msg-time">${time}</div>
        </div>
        <div class="msg-icon user"><i class="fas fa-user"></i></div>`;
      container.appendChild(div);
      scrollToBottom();
    }

    function appendBotMessage(text, isError = false) {
      const container = document.getElementById('chatMessages');
      const time = now();
      const div = document.createElement('div');
      div.className = 'msg-row bot-row';
      div.innerHTML = `
        <div class="msg-icon bot"><i class="fas fa-leaf"></i></div>
        <div>
          <div class="msg-bubble bot ${isError ? 'error' : ''}">${renderMarkdown(text)}</div>
          <div class="msg-time">${time}</div>
        </div>`;
      container.appendChild(div);
      scrollToBottom();
    }

    function showTyping() {
      const container = document.getElementById('chatMessages');
      const id = 'typing-' + Date.now();
      const div = document.createElement('div');
      div.className = 'msg-row bot-row';
      div.id = id;
      div.innerHTML = `
        <div class="msg-icon bot"><i class="fas fa-leaf"></i></div>
        <div class="typing-indicator">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>`;
      container.appendChild(div);
      scrollToBottom();
      return id;
    }

    function removeTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function scrollToBottom() {
      const c = document.getElementById('chatMessages');
      c.scrollTop = c.scrollHeight;
    }

    function clearChat() {
      if (!confirm('Clear the conversation history?')) return;
      conversationHistory = [];
      const c = document.getElementById('chatMessages');
      c.innerHTML = '';
      document.getElementById('suggestionsRow').style.display = 'flex';
      appendBotMessage('Conversation cleared. How can I help you?');
    }

    function now() {
      return new Date().toLocaleTimeString('en-KE', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // Lightweight markdown: bold, italic, bullet lists, line breaks
    function renderMarkdown(text) {
      let html = escapeHtml(text);
      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Italic
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // Inline code
      html = html.replace(/`(.+?)`/g, '<code>$1</code>');
      // Bullet lists (lines starting with • or - or *)
      html = html.replace(/^[•\-\*] (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
      // Numbered lists
      html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
      // Line breaks
      html = html.replace(/\n/g, '<br>');
      return html;
    }
  </script>

</body>
</html>
