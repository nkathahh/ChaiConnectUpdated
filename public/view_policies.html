<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy Documents — ChaiConnect</title>
  <link rel="stylesheet" href="/css/farmer_dashboard_items.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <script src="theme.js"></script>

  <div class="page-wrapper">

    <div class="page-header">
      <div class="page-header-left">
        <h1><i class="fas fa-file-lines"></i> Policy Documents</h1>
        <p>Read official guidelines and documents for ChaiConnect.</p>
        <span class="role-pill" id="rolePill"><i class="fas fa-id-badge"></i> Role: checking…</span>
      </div>
      <div class="btn-group">
        <a href="/" id="backBtn" class="btn-back-dashboard">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </div>

    <div class="section-card" style="padding:0;overflow:hidden;">
      <div style="padding:1.25rem 1.75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;">
        <span style="font-size:.85rem;color:var(--text-light);font-weight:600;">
          <span id="policyCount">0</span> documents
        </span>
      </div>
      <div id="policies" style="padding:1.25rem 1.5rem;display:grid;gap:1rem;"></div>
      <div id="emptyState" class="empty-state" style="display:none;">
        <div class="empty-state-icon"><i class="fas fa-folder-open"></i></div>
        <h3>No policies uploaded yet</h3>
        <p>Check back later for official guidelines and documents.</p>
      </div>
    </div>

  </div>

  <!-- Edit Policy Modal (admin only) -->
  <div id="editPolicyModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h3><i class="fas fa-pen-to-square"></i> Edit Policy</h3>
        <button type="button" class="modal-close" onclick="closePolicyModal()">×</button>
      </div>
      <form id="editPolicyForm">
        <input type="hidden" id="editPolicyId" />
        <div class="form-group">
          <label for="editPolicyTitle">Title</label>
          <input type="text" id="editPolicyTitle" required />
        </div>
        <div class="form-group">
          <label for="editPolicyDescription">Description</label>
          <textarea id="editPolicyDescription" rows="5"></textarea>
        </div>
        <div class="btn-group right" style="margin-top:1rem;">
          <button type="button" class="btn btn-secondary" onclick="closePolicyModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const roleMap = {
      admin:             '/admin_dashboard.html',
      extension_officer: '/extension_officer_dashboard.html',
      farmer:            '/farmer_dashboard.html',
      factory_staff:     '/factory_staff_dashboard.html'
    };

    let currentRole = 'guest';

    async function loadMeRole() {
      try {
        const res  = await fetch('/api/me');
        if (!res.ok) { currentRole = 'guest'; return; }
        const data = await res.json();
        currentRole = data.role || 'guest';
        document.getElementById('rolePill').innerHTML = `<i class="fas fa-id-badge"></i> Role: ${currentRole}`;
        document.getElementById('backBtn').href = roleMap[currentRole.toLowerCase()] || '/';
      } catch {
        currentRole = 'guest';
      }
    }

    function openPolicyModal(doc) {
      document.getElementById('editPolicyId').value          = doc.document_id;
      document.getElementById('editPolicyTitle').value       = doc.title       || '';
      document.getElementById('editPolicyDescription').value = doc.description || '';
      document.getElementById('editPolicyModal').classList.add('show');
    }

    function closePolicyModal() {
      document.getElementById('editPolicyModal').classList.remove('show');
    }

    document.addEventListener('click', e => {
      const modal = document.getElementById('editPolicyModal');
      if (modal.classList.contains('show') && e.target === modal) closePolicyModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePolicyModal(); });

    async function deletePolicy(id) {
      if (!confirm('Delete this policy?')) return;
      const res  = await fetch(`/admin/policies/${id}`, { method: 'DELETE' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return alert(data.message || 'Delete failed');
      alert(data.message || 'Deleted');
      fetchPolicies();
    }

    async function fetchPolicies() {
      await loadMeRole();
      const container  = document.getElementById('policies');
      const emptyState = document.getElementById('emptyState');

      try {
        const res  = await fetch('/policies');
        const data = await res.json().catch(() => []);

        document.getElementById('policyCount').textContent = Array.isArray(data) ? data.length : 0;

        if (!data || !data.length) {
          container.innerHTML   = '';
          emptyState.style.display = 'block';
          return;
        }
        emptyState.style.display = 'none';

        container.innerHTML = data.map(doc => {
          const adminControls = currentRole === 'admin' ? `
            <div class="btn-group" style="margin-top:.75rem;">
              <button class="btn btn-sm" style="background:#fef3c7;color:#92400e;" onclick='openPolicyModal(${JSON.stringify(doc)})'>
                <i class="fas fa-pen"></i> Edit
              </button>
              <button class="btn btn-danger btn-sm" onclick='deletePolicy(${doc.document_id})'>
                <i class="fas fa-trash"></i> Delete
              </button>
            </div>` : '';

          return `
            <div class="material-card">
              <div class="card-top">
                <div>
                  <div class="card-title">${doc.title}</div>
                  <div class="card-desc">${doc.description || 'No description provided.'}</div>
                  <div class="card-meta">
                    <i class="fas fa-clock"></i>
                    Uploaded ${new Date(doc.uploaded_at).toLocaleString('en-KE', { dateStyle:'medium', timeStyle:'short' })}
                    &bull;
                    <a href="${doc.file_path}" target="_blank" class="btn btn-secondary btn-sm" style="margin-left:.25rem;">
                      <i class="fas fa-file-arrow-down"></i> View / Download
                    </a>
                  </div>
                  ${adminControls}
                </div>
              </div>
            </div>`;
        }).join('');
      } catch {
        container.innerHTML = `
          <div class="notice notice-error">
            <i class="fas fa-exclamation-circle"></i> Failed to load policy documents.
          </div>`;
      }
    }

    document.getElementById('editPolicyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editPolicyId').value;
      if (!id || id === 'undefined') { alert('Missing policy ID. Please refresh.'); return; }

      const res  = await fetch(`/admin/policies/${id}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          title:       document.getElementById('editPolicyTitle').value.trim(),
          description: document.getElementById('editPolicyDescription').value
        })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return alert(data.message || 'Update failed');
      alert(data.message || 'Updated');
      closePolicyModal();
      fetchPolicies();
    });

    fetchPolicies();
  </script>

</body>
</html>
