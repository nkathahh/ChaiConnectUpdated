<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ChaiConnect</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="auth-page">

  <div class="auth-split">

    <!-- Visual panel -->
    <div class="auth-visual">
      <div class="auth-visual-bg"></div>
      <div class="auth-visual-copy">
        <h2>Kenya's Tea<br>Supply Chain,<br><em>Reimagined.</em></h2>
        <p>Real-time delivery, payments and quality data — all in one platform.</p>
      </div>
    </div>

    <!-- Form panel -->
    <div class="auth-form-panel">
      <div class="auth-logo">
        <span>🍃 ChaiConnect</span>
      </div>

      <h2>Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <form action="/login" method="POST">
        <div class="form-group">
          <label for="identifier">ID Number or Email</label>
          <input type="text" name="identifier" id="identifier" required placeholder="e.g. 12345678 or you@mail.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" name="password" id="password" required placeholder="Enter your password" />
        </div>
        <input type="submit" value="Sign In →" />
      </form>

      <p class="toggle-link">Don't have an account? <a href="register.html">Register here</a></p>
      <button class="back-to-home" onclick="window.location.href='index.html'">← Back to Home</button>
    </div>

  </div>

</body>
</html>
