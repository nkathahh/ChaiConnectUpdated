<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — ChaiConnect</title>
  <link rel="stylesheet" href="/css/farmer_dashboard_items.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <script src="theme.js"></script>

  <div class="page-wrapper wide">

    <div class="page-header">
      <div class="page-header-left">
        <h1><i class="fas fa-inbox"></i> Notifications</h1>
        <p>Visit requests, status updates, and your personal activity feed.</p>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary btn-sm" id="refreshBtn">
          <i class="fas fa-rotate-right"></i> Refresh
        </button>
        <button class="btn btn-primary btn-sm" id="markAllBtn">
          <i class="fas fa-check-double"></i> Mark all read
        </button>
        <a id="backBtn" href="/" class="btn-back-dashboard">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        <i class="fas fa-magnifying-glass"></i>
        <input id="searchInput" type="text" placeholder="Search title, message, category…" />
      </div>
      <div class="tabs" id="tabGroup">
        <button class="tab-btn active" data-filter="all">
          All <span class="count-pill" id="allCount" style="display:none;">0</span>
        </button>
        <button class="tab-btn" data-filter="unread">
          Unread <span class="count-pill" id="unreadCount" style="display:none;">0</span>
        </button>
        <button class="tab-btn" data-filter="visits">Visits</button>
        <button class="tab-btn" data-filter="training">Training</button>
        <button class="tab-btn" data-filter="payments">Payments</button>
      </div>
    </div>

    <div id="notifList"></div>

  </div>

  <script>
    let me = { role: 'guest' };
    let raw = [];
    let activeFilter = 'all';
    let queryText = '';

    async function loadMe() {
      try {
        const res = await fetch('/api/me');
        if (res.ok) me = await res.json();
      } catch {}
      const map = {
        admin:             '/admin_dashboard.html',
        extension_officer: '/extension_officer_dashboard.html',
        farmer:            '/farmer_dashboard.html',
        factory_staff:     '/factory_staff_dashboard.html'
      };
      document.getElementById('backBtn').href = map[(me.role || '').toLowerCase()] || '/';
    }

    function escapeHtml(str = '') {
      return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }

    function iconFor(cat = '') {
      const c = cat.toLowerCase();
      if (c.includes('visit'))  return '📍';
      if (c.includes('train'))  return '📚';
      if (c.includes('pay'))    return '💸';
      if (c.includes('system')) return '🛠️';
      return '🔔';
    }

    function applyFilters(items) {
      let out = [...items];
      if (activeFilter === 'unread') out = out.filter(x => !x.is_read);
      if (['visits','training','payments'].includes(activeFilter))
        out = out.filter(x => String(x.category || '').toLowerCase().includes(activeFilter));
      if (queryText) {
        const q = queryText.toLowerCase();
        out = out.filter(x =>
          String(x.title   || '').toLowerCase().includes(q) ||
          String(x.message || '').toLowerCase().includes(q) ||
          String(x.category|| '').toLowerCase().includes(q)
        );
      }
      return out;
    }

    async function fetchNotifications() {
      const res  = await fetch('/api/notifications');
      const data = await res.json().catch(() => ({}));
      raw = (data && data.success && Array.isArray(data.notifications)) ? data.notifications : [];

      const unread = raw.filter(n => !n.is_read).length;

      const allCount    = document.getElementById('allCount');
      const unreadCount = document.getElementById('unreadCount');
      allCount.textContent    = raw.length;
      unreadCount.textContent = unread;
      allCount.style.display    = raw.length > 0 ? 'inline-flex' : 'none';
      unreadCount.style.display = unread > 0     ? 'inline-flex' : 'none';

      render();
    }

    function render() {
      const list  = document.getElementById('notifList');
      const items = applyFilters(raw);

      if (!items.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon"><i class="fas fa-inbox"></i></div>
            <h3>No notifications found</h3>
            <p>Try changing your filters or search term.</p>
          </div>`;
        return;
      }

      list.innerHTML = items.map(n => {
        const created  = n.created_at ? new Date(n.created_at).toLocaleString('en-KE', { dateStyle:'medium', timeStyle:'short' }) : '';
        const category = (n.category || 'general').toLowerCase();
        return `
          <div class="notif-item ${n.is_read ? '' : 'unread'}" data-id="${n.id}" data-link="${escapeHtml(n.link || '')}">
            <div class="notif-row">
              <div style="display:flex;gap:.85rem;align-items:flex-start;min-width:0;flex:1;">
                <div class="notif-icon">${iconFor(n.category)}</div>
                <div style="min-width:0;flex:1;">
                  <div class="notif-title">${escapeHtml(n.title || 'Notification')}</div>
                  <div class="notif-meta">${escapeHtml(category)} &bull; ${created}</div>
                  <div class="notif-msg">${escapeHtml(n.message || '')}</div>
                  <div class="btn-group" style="margin-top:.65rem;">
                    ${!n.is_read ? `<button class="btn btn-secondary btn-sm" data-action="read"><i class="fas fa-check"></i> Mark read</button>` : ''}
                    ${n.link     ? `<button class="btn btn-primary btn-sm"   data-action="open"><i class="fas fa-arrow-up-right-from-square"></i> Open</button>` : ''}
                  </div>
                </div>
              </div>
              <span class="notif-badge">${escapeHtml(category)}</span>
            </div>
          </div>`;
      }).join('');

      // Attach events
      list.querySelectorAll('.notif-item').forEach(el => {
        const id   = Number(el.dataset.id);
        const link = el.dataset.link;

        el.addEventListener('click', async (e) => {
          if (e.target.closest('button')) return;
          const item = raw.find(x => x.id === id);
          if (item && !item.is_read) await markRead(id, true);
          if (link) window.location.href = link;
        });

        el.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (btn.dataset.action === 'read') await markRead(id);
            if (btn.dataset.action === 'open') {
              const item = raw.find(x => x.id === id);
              if (item && !item.is_read) await markRead(id, true);
              if (link) window.location.href = link;
            }
          });
        });
      });
    }

    async function markRead(id, silent = false) {
      await fetch(`/api/notifications/${id}/read`, { method: 'PUT' }).catch(() => {});
      raw = raw.map(x => x.id === id ? { ...x, is_read: 1 } : x);
      const unread = raw.filter(n => !n.is_read).length;
      const badge = document.getElementById('unreadCount');
      badge.textContent    = unread;
      badge.style.display  = unread > 0 ? 'inline-flex' : 'none';
      if (!silent) render();
    }

    async function markAllRead() {
      await fetch('/api/notifications/read-all', { method: 'PUT' }).catch(() => {});
      raw = raw.map(x => ({ ...x, is_read: 1 }));
      document.getElementById('unreadCount').style.display = 'none';
      render();
    }

    // UI hooks
    document.getElementById('refreshBtn').onclick = fetchNotifications;
    document.getElementById('markAllBtn').onclick  = markAllRead;

    document.getElementById('searchInput').addEventListener('input', e => {
      queryText = (e.target.value || '').trim();
      render();
    });

    document.getElementById('tabGroup').addEventListener('click', e => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
    });

    (async () => {
      await loadMe();
      await fetchNotifications();
    })();
  </script>

</body>
</html>
