<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Materials — ChaiConnect</title>
  <link rel="stylesheet" href="/css/farmer_dashboard_items.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <script src="/theme.js"></script>

  <div class="page-wrapper wide">

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header-left">
        <h1><i class="fas fa-book-open"></i> Training Materials</h1>
        <p>Resources, guides and bulletins shared by your extension officers.</p>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary btn-sm" onclick="fetchMaterials()">
          <i class="fas fa-rotate-right"></i> Refresh
        </button>
        <a href="/" id="backBtn" class="btn-back-dashboard">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box" style="flex:1;">
        <i class="fas fa-magnifying-glass"></i>
        <input id="searchInput" type="text" placeholder="Search by title, description, uploader..." />
      </div>
      <select id="typeFilter" style="padding:.55rem .9rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.82rem;background:var(--white);color:var(--text-dark);">
        <option value="">All Types</option>
        <option value="file">File</option>
        <option value="text">Text</option>
      </select>
      <button class="btn btn-outline btn-sm" id="clearSearchBtn">
        <i class="fas fa-xmark"></i> Clear
      </button>
    </div>

    <!-- Count bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
      <span id="resultCount" style="font-size:.82rem;color:var(--text-light);">Loading...</span>
    </div>

    <!-- Cards Grid -->
    <div class="materials-grid" id="materialsGrid">
      <div style="grid-column:1/-1;" class="empty-state">
        <div class="spinner"></div>
        <p style="margin-top:.75rem;">Loading materials...</p>
      </div>
    </div>

  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3><i class="fas fa-pen-to-square"></i> Edit Training Material</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <form id="editForm">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label for="editTitle">Title</label>
            <input type="text" id="editTitle" required />
          </div>
          <div class="form-group">
            <label for="editDescription">Description</label>
            <textarea id="editDescription" rows="3"></textarea>
          </div>
          <div class="form-group" id="textGroup" style="display:none;">
            <label for="editText">Text Content</label>
            <textarea id="editText" rows="6"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="document.getElementById('editForm').requestSubmit()">
          <i class="fas fa-floppy-disk"></i> Save Changes
        </button>
      </div>
    </div>
  </div>

  <script>
    const roleMap = {
      admin:             '/admin_dashboard.html',
      extension_officer: '/extension_officer_dashboard.html',
      farmer:            '/farmer_dashboard.html',
      factory_staff:     '/factory_staff_dashboard.html'
    };

    let me = { role: 'guest' };
    let currentDoc = null;
    let allMaterials = [];

    async function loadMe() {
      try {
        const res = await fetch('/api/me');
        if (res.ok) me = await res.json();
      } catch {}
      document.getElementById('backBtn').href = roleMap[(me.role || '').toLowerCase()] || '/';
    }

    function esc(str = '') {
      return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }

    function typeIcon(type) {
      if (!type || type === 'text') return `<div class="material-type-icon type-text"><i class="fas fa-align-left"></i></div>`;
      const ext = (type || '').toLowerCase();
      if (ext.includes('pdf')) return `<div class="material-type-icon type-pdf"><i class="fas fa-file-pdf"></i></div>`;
      if (ext.includes('video')) return `<div class="material-type-icon type-video"><i class="fas fa-play-circle"></i></div>`;
      return `<div class="material-type-icon type-file"><i class="fas fa-paperclip"></i></div>`;
    }

    function typeChip(type) {
      if (!type || type === 'text') return `<span class="chip chip-text"><i class="fas fa-align-left"></i> Text</span>`;
      return `<span class="chip chip-file"><i class="fas fa-paperclip"></i> File</span>`;
    }

    function openModal(doc) {
      currentDoc = doc;
      document.getElementById('editId').value = doc.id;
      document.getElementById('editTitle').value = doc.title || '';
      document.getElementById('editDescription').value = doc.description || '';
      const isText = doc.material_type === 'text';
      document.getElementById('textGroup').style.display = isText ? 'block' : 'none';
      document.getElementById('editText').value = isText ? (doc.text_content || '') : '';
      document.getElementById('editModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('show');
      currentDoc = null;
    }

    async function deleteDoc(id) {
      if (!confirm('Delete this training material? This cannot be undone.')) return;
      const res = await fetch(`/api/training-materials/${id}`, { method: 'DELETE' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return alert(data.message || 'Delete failed');
      fetchMaterials();
    }

    function buildSearchText(doc) {
      return [doc.title, doc.description, doc.uploaded_by, doc.material_type]
        .map(v => (v || '').toLowerCase()).join(' ');
    }

    function applyFilters() {
      const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
      const type = (document.getElementById('typeFilter').value || '').toLowerCase();
      let list = allMaterials;
      if (q) list = list.filter(d => buildSearchText(d).includes(q));
      if (type) list = list.filter(d => (d.material_type || '').toLowerCase() === type);
      renderMaterials(list);
    }

    function renderMaterials(list) {
      const grid = document.getElementById('materialsGrid');
      document.getElementById('resultCount').textContent =
        `${list.length} material${list.length !== 1 ? 's' : ''} found`;

      if (!list.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <div class="empty-state-icon"><i class="fas fa-folder-open"></i></div>
            <h3>No materials found</h3>
            <p>Try a different search term or check back later.</p>
          </div>`;
        return;
      }

      grid.innerHTML = list.map(doc => {
        const uploaderName = esc(doc.uploaded_by || 'Unknown');
        const uploadDate = doc.upload_date
          ? new Date(doc.upload_date).toLocaleDateString('en-KE', { day:'numeric', month:'short', year:'numeric' })
          : 'Unknown date';

        const bodyContent = doc.material_type === 'text'
          ? `<div class="text-preview-box">${esc(doc.text_content || 'No content.')}</div>`
          : (doc.file_path
              ? `<a class="btn btn-primary btn-sm" href="${doc.file_path}" target="_blank">
                   <i class="fas fa-external-link-alt"></i> Open Resource
                 </a>`
              : `<span style="font-size:.82rem;color:var(--red);"><i class="fas fa-exclamation-triangle"></i> File not available</span>`);

        const adminBtns = (doc.can_edit || doc.can_delete) ? `
          <div class="btn-group" style="margin-top:.6rem;">
            ${doc.can_edit ? `<button class="btn btn-sm" style="background:#fef3c7;color:#92400e;border-color:#fde68a;" onclick='openModal(${JSON.stringify(doc)})'>
              <i class="fas fa-pen"></i> Edit</button>` : ''}
            ${doc.can_delete ? `<button class="btn btn-danger btn-sm" onclick="deleteDoc(${doc.id})">
              <i class="fas fa-trash"></i> Delete</button>` : ''}
          </div>` : '';

        return `
          <div class="material-card">
            <div class="material-card-header">
              ${typeIcon(doc.material_type)}
              <div style="flex:1;min-width:0;">
                <div class="material-card-title">${esc(doc.title || 'Untitled')}</div>
                <div class="material-card-desc">${esc(doc.description || 'No description provided.')}</div>
              </div>
              ${typeChip(doc.material_type)}
            </div>
            <div class="material-card-body">
              ${bodyContent}
              ${adminBtns}
            </div>
            <div class="material-card-footer">
              <div class="material-meta-info">
                <span class="material-meta-uploader"><i class="fas fa-user" style="color:var(--green-mid);margin-right:.3rem;font-size:.75rem;"></i>${uploaderName}</span>
                <span class="material-meta-date"><i class="fas fa-clock" style="margin-right:.3rem;font-size:.7rem;"></i>${uploadDate}</span>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    async function fetchMaterials() {
      const grid = document.getElementById('materialsGrid');
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="spinner"></div><p style="margin-top:.75rem;">Loading...</p></div>`;
      document.getElementById('resultCount').textContent = 'Loading...';
      try {
        const res = await fetch('/training-materials');
        const items = await res.json();
        allMaterials = Array.isArray(items) ? items : [];
        applyFilters();
      } catch {
        grid.innerHTML = `
          <div class="notice notice-error" style="grid-column:1/-1;">
            <i class="fas fa-exclamation-circle"></i> Failed to load training materials. Please refresh.
          </div>`;
      }
    }

    document.getElementById('editForm').addEventListener('submit', async e => {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const payload = {
        title: document.getElementById('editTitle').value.trim(),
        description: document.getElementById('editDescription').value.trim(),
        ...(currentDoc?.material_type === 'text' && { text_content: document.getElementById('editText').value })
      };
      const res = await fetch(`/api/training-materials/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return alert(data.message || 'Update failed');
      closeModal();
      fetchMaterials();
    });

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('typeFilter').addEventListener('change', applyFilters);
    document.getElementById('clearSearchBtn').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      document.getElementById('typeFilter').value = '';
      renderMaterials(allMaterials);
    });

    document.addEventListener('click', e => {
      const modal = document.getElementById('editModal');
      if (modal.classList.contains('show') && e.target === modal) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    (async () => {
      await loadMe();
      await fetchMaterials();
    })();
  </script>

</body>
</html>
