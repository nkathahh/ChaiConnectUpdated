<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — ChaiConnect</title>
  <link rel="stylesheet" href="/css/farmer_dashboard_items.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <script src="theme.js"></script>

  <div class="page-wrapper">

    <div class="page-header">
      <div class="page-header-left">
        <h1><i class="fas fa-user-circle"></i> My Profile</h1>
        <p>Update your account information and security details.</p>
        <span class="role-pill" id="rolePill"><i class="fas fa-id-badge"></i> Role: loading…</span>
      </div>
      <a href="/" id="backBtn" class="btn-back-dashboard">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </a>
    </div>

    <div class="profile-grid">

      <!-- Personal Information -->
      <div class="section-card">
        <h2 class="section-card-title"><i class="fas fa-address-card"></i> Personal Information</h2>
        <p style="color:var(--text-light);font-size:.85rem;margin-bottom:1.25rem;">Keep your contact details up to date.</p>

        <form id="profileForm" style="background:none;border:none;padding:0;box-shadow:none;max-width:100%;margin:0;">
          <div class="form-grid-2">
            <div class="form-group full">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" required />
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" required />
            </div>
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="text" id="phone" name="phone" required />
            </div>
            <div class="form-group">
              <label for="id_number">ID Number</label>
              <input type="text" id="id_number" name="id_number" disabled />
            </div>
            <div class="form-group">
              <label for="role">Role</label>
              <input type="text" id="role" name="role" disabled />
            </div>
          </div>
          <div class="btn-group right" style="margin-top:.5rem;">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-floppy-disk"></i> Save Changes
            </button>
          </div>
        </form>
      </div>

      <!-- Security -->
      <div class="section-card">
        <h2 class="section-card-title"><i class="fas fa-lock"></i> Security</h2>
        <p style="color:var(--text-light);font-size:.85rem;margin-bottom:1.25rem;">Change your password anytime.</p>

        <form id="passwordForm" style="background:none;border:none;padding:0;box-shadow:none;max-width:100%;margin:0;">
          <div class="form-group">
            <label for="currentPassword">Current Password</label>
            <input type="password" id="currentPassword" name="currentPassword" required />
          </div>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="newPassword" required />
          </div>
          <div class="btn-group right" style="margin-top:.5rem;">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-key"></i> Change Password
            </button>
          </div>
          <p style="margin-top:.85rem;font-size:.8rem;color:var(--text-light);">
            <i class="fas fa-circle-info"></i> Use at least 8 characters and avoid reusing old passwords.
          </p>
        </form>
      </div>

    </div>
  </div>

  <script>
    const roleMap = {
      admin:             '/admin_dashboard.html',
      factory_staff:     '/factory_staff_dashboard.html',
      farmer:            '/farmer_dashboard.html',
      extension_officer: '/extension_officer_dashboard.html'
    };

    async function loadProfile() {
      try {
        const res  = await fetch('/my-profile');
        const data = await res.json();

        document.getElementById('name').value      = data.name      || '';
        document.getElementById('email').value     = data.email     || '';
        document.getElementById('phone').value     = data.phone     || '';
        document.getElementById('id_number').value = data.id_number || '';
        document.getElementById('role').value      = data.role      || '';

        const role = (data.role || '').toLowerCase();
        document.getElementById('rolePill').innerHTML = `<i class="fas fa-id-badge"></i> Role: ${data.role || 'N/A'}`;
        document.getElementById('backBtn').href = roleMap[role] || '/login.html';
      } catch (err) {
        console.error('Error loading profile:', err);
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const orig = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> Saving…';
      try {
        const res = await fetch('/my-profile/update', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            name:  document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value
          })
        });
        const result = await res.json();
        alert(result.success ? 'Profile updated successfully!' : (result.error || 'Error updating profile'));
      } catch {
        alert('Error updating profile. Please try again.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = orig;
      }
    });

    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const orig = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> Updating…';
      try {
        const res = await fetch('/my-profile/change-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            currentPassword: document.getElementById('currentPassword').value,
            newPassword:     document.getElementById('newPassword').value
          })
        });
        const result = await res.json();
        if (result.success) {
          alert(result.message || 'Password changed successfully!');
          document.getElementById('currentPassword').value = '';
          document.getElementById('newPassword').value     = '';
        } else {
          alert(result.error || 'Error changing password.');
        }
      } catch {
        alert('Error changing password. Please try again.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = orig;
      }
    });

    loadProfile();
  </script>

</body>
</html>
